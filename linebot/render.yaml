services:
  - type: web
    name: fangpeiling-linebot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: WEBSITE_URL
        value: https://www.fangpeiling.com.tw
